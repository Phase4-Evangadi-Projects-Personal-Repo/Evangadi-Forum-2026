openapi: 3.2.0
info:
  title: Evangadi Forum Answer API
  version: 1.0.0
  description: Answer endpoints
servers:
  - url: /
tags:
  - name: answer
paths:
  /api/answers:
    post:
      tags:
        - answer
      summary: Post a new answer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnswerRequest'
      responses:
        '201':
          description: Answer posted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleAnswerResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    get:
      tags:
        - answer
      summary: Get answers by question. Max 100 records.
      parameters:
        - in: query
          name: questionId
          required: true
          schema:
            type: integer
            minimum: 1
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [newest, oldest]
      responses:
        '200':
          description: Answers fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAnswersResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
  /api/answers/{answerId}:
    get:
      tags:
        - answer
      summary: Get one answer
      parameters:
        - in: path
          name: answerId
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Answer fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleAnswerResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags:
        - answer
      summary: Update one answer
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: answerId
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAnswerRequest'
      responses:
        '200':
          description: Answer updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleAnswerResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags:
        - answer
      summary: Delete one answer
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: answerId
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Answer deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAnswerResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
components:
  schemas:
    AnswerAuthor:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
    Answer:
      type: object
      properties:
        id:
          type: integer
        questionId:
          type: integer
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        author:
          $ref: '#/components/schemas/AnswerAuthor'
    CreateAnswerRequest:
      type: object
      required:
        - questionId
        - content
      properties:
        questionId:
          type: integer
          minimum: 1
        content:
          type: string
          minLength: 20
    UpdateAnswerRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 20
    SingleAnswerResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/Answer'
    ListAnswersResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Answer'
        meta:
          type: object
          properties:
            limit:
              type: integer
            total:
              type: integer
            sortBy:
              type: string
    DeleteAnswerResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            id:
              type: integer
